<!DOCTYPE html>
<html lang="en" data-theme="dark">

{% include analytics.html %}
{% include head.html %}

<style>
/* =============================================================================
   DEFAULT SUB-PAGE LAYOUT — Consistent with home redesign
   ============================================================================= */

:root,
[data-theme="dark"] {
  --bg:          #111116;
  --bg-surf:     #18181f;
  --bg-card:     #1c1c26;
  --bg-hover:    #22222e;
  --border:      rgba(255, 255, 255, 0.07);
  --border-hi:   rgba(141, 126, 220, 0.5);
  --tx:          rgba(210, 210, 218, 0.97);
  --tx-2:        #a8a8c2;
  --tx-muted:    #72728c;
  --accent:      #8d7edc;
  --accent-hi:   #a897e8;
  --accent-dim:  rgba(141, 126, 220, 0.12);
  --green:       #42b983;
  --green-hi:    #60d09d;
  --red:         #f56565;
  --nav-bg:      rgba(17, 17, 22, 0.88);
  --shadow-sm:   0 2px 10px rgba(0,0,0,0.4);
  --shadow-md:   0 4px 24px rgba(0,0,0,0.5);
}

[data-theme="light"] {
  --bg:          #f3f3f7;
  --bg-surf:     #ffffff;
  --bg-card:     #ffffff;
  --bg-hover:    #f7f7fb;
  --border:      rgba(0,0,0,0.09);
  --border-hi:   rgba(107, 90, 210, 0.5);
  --tx:          #15151e;
  --tx-2:        #4e4e72;
  --tx-muted:    #9898b0;
  --accent:      #6b5acd;
  --accent-hi:   #7d6bdf;
  --accent-dim:  rgba(107,90,205,0.1);
  --green:       #1e9e72;
  --green-hi:    #28b885;
  --red:         #e53e3e;
  --nav-bg:      rgba(243,243,247,0.92);
  --shadow-sm:   0 2px 10px rgba(0,0,0,0.07);
  --shadow-md:   0 4px 24px rgba(0,0,0,0.1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; scroll-padding-top: 62px; }

body {
  background: var(--bg);
  color: var(--tx);
  font-family: "Source Sans Pro","Helvetica Neue", Arial, sans-serif;
  font-size: 16px; line-height: 1.75;
  -webkit-font-smoothing: antialiased;
  transition: background 0.3s, color 0.3s;
}

a { color: var(--green); text-decoration: none; transition: color 0.2s; }
a:hover, a:focus { color: var(--green-hi); }

img { display: block; max-width: 100%; }

/* Nav */
.site-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(1rem, 5vw, 3rem);
  background: var(--nav-bg);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.nav-brand {
  font-size: 1rem; font-weight: 700; letter-spacing: -0.02em;
  color: var(--tx) !important; transition: color 0.2s;
}
.nav-brand:hover { color: var(--accent) !important; }

.nav-links { display: flex; align-items: center; gap: 0.1rem; }

.nav-link {
  position: relative;
  font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--tx-2) !important;
  padding: 0.4rem 0.8rem; border-radius: 6px;
  transition: color 0.2s, background 0.2s;
}
.nav-link::after {
  content: ''; position: absolute; bottom: 3px; left: 50%; right: 50%;
  height: 1.5px; background: var(--accent); border-radius: 2px;
  transition: left 0.25s ease, right 0.25s ease;
}
.nav-link:hover { color: var(--tx) !important; background: rgba(255,255,255,0.04); }
.nav-link:hover::after { left: 12%; right: 12%; }

.theme-btn {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--tx-2); cursor: pointer;
  width: 34px; height: 34px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  margin-left: 0.75rem; font-size: 0.88rem; transition: all 0.2s;
}
.theme-btn:hover {
  background: var(--bg-hover); color: var(--accent);
  border-color: var(--border-hi); transform: rotate(15deg);
}

/* Page content */
.page-content {
  padding-top: 60px;
  max-width: 900px; margin: 0 auto;
  padding-left: clamp(1.25rem, 5vw, 2.5rem);
  padding-right: clamp(1.25rem, 5vw, 2.5rem);
  padding-bottom: 80px;
}

/* Headings in content */
.page-content h1 {
  font-size: clamp(1.6rem, 3.5vw, 2.1rem);
  font-weight: 700; letter-spacing: -0.025em; line-height: 1.2;
  color: var(--tx); margin: 2.5rem 0 1.75rem;
}

/* Re-expose pub-card / proj-grid styles for sub-pages */
.pub-list { display: flex; flex-direction: column; gap: 0.85rem; }

.pub-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  display: flex; align-items: stretch;
  transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
}
.pub-card:hover { border-color: var(--border-hi); transform: translateY(-2px); box-shadow: var(--shadow-md); }

.pub-thumb {
  flex-shrink: 0; width: 230px; background: var(--bg-surf); overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.pub-thumb video, .pub-thumb img {
  width: 100%; height: 100%; object-fit: contain; display: block; margin: 0;
}

.pub-body { padding: 1.1rem 1.35rem; flex: 1; display: flex; flex-direction: column; justify-content: center; }

.pub-badges { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.6rem; }
.badge { display: inline-flex; align-items: center; font-size: 0.63rem; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.15em 0.55em; border-radius: 4px; }
.badge-venue  { color: var(--tx-muted); background: var(--bg-surf); border: 1px solid var(--border); }
.badge-oral   { color: var(--red); background: rgba(245,101,101,0.1); border: 1px solid rgba(245,101,101,0.2); }
.badge-review { color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(141,126,220,0.25); }

.pub-title { font-size: 0.95rem; font-weight: 700; line-height: 1.35; color: var(--tx); margin-bottom: 0.45rem; letter-spacing: -0.01em; }
.pub-authors { font-size: 0.79rem; color: var(--tx-2); margin-bottom: 0.9rem; line-height: 1.55; }
.pub-authors strong { color: var(--tx); font-weight: 700; }
.pub-actions { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.pub-btn {
  display: inline-flex; align-items: center; gap: 0.3rem;
  font-size: 0.73rem; font-weight: 700; color: var(--tx-2) !important;
  padding: 0.3rem 0.7rem; border-radius: 6px;
  background: var(--bg); border: 1px solid var(--border); transition: all 0.2s;
}
.pub-btn:hover { color: var(--accent) !important; border-color: var(--border-hi); background: var(--accent-dim); transform: translateY(-1px); }
.pub-btn i { font-size: 0.85em; }

.proj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.proj-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  display: flex; flex-direction: column;
  transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
}
.proj-card:hover { border-color: var(--border-hi); transform: translateY(-3px); box-shadow: var(--shadow-md); }
.proj-img {
  height: 175px; overflow: hidden;
  background: var(--bg-surf);
  display: flex; align-items: center; justify-content: center;
}
.proj-img img {
  max-width: 100%; max-height: 100%;
  width: auto; height: auto;
  object-fit: contain; display: block; margin: 0;
  transition: transform 0.45s ease;
}
.proj-card:hover .proj-img img { transform: scale(1.04); }
.proj-body { padding: 1rem 1.2rem 1.2rem; flex: 1; display: flex; flex-direction: column; }
.proj-name { font-size: 0.9rem; font-weight: 700; color: var(--tx); margin-bottom: 0.4rem; line-height: 1.3; letter-spacing: -0.01em; }
.proj-desc { font-size: 0.79rem; color: var(--tx-2); flex: 1; line-height: 1.65; margin-bottom: 0.9rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.proj-actions { display: flex; flex-wrap: wrap; gap: 0.35rem; }
.proj-btn { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.71rem; font-weight: 700; color: var(--tx-2) !important; padding: 0.25rem 0.6rem; border-radius: 5px; background: var(--bg); border: 1px solid var(--border); transition: all 0.2s; }
.proj-btn:hover { color: var(--accent) !important; border-color: var(--border-hi); background: var(--accent-dim); transform: translateY(-1px); }
.proj-btn i { font-size: 0.82em; }

/* About section */
.about-bio { color: var(--tx-2); font-size: 0.975rem; line-height: 1.85; }
.about-bio a { color: var(--green); }
.about-bio a:hover { color: var(--green-hi); }

.tl-block { margin-bottom: 2rem; }
.tl-header { font-size: 0.68rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--tx-muted); margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
.tl-item { display: flex; gap: 0.8rem; padding: 0.55rem 0.5rem; margin: 0 -0.5rem; border-radius: 6px; border-bottom: 1px solid var(--border); transition: background 0.2s; }
.tl-item:last-child { border-bottom: none; }
.tl-item:hover { background: var(--bg-hover); }
.tl-date { flex-shrink: 0; width: 88px; font-size: 0.73rem; color: var(--tx-muted); font-variant-numeric: tabular-nums; padding-top: 1px; line-height: 1.4; }
.tl-org { font-size: 0.88rem; font-weight: 700; color: var(--tx); line-height: 1.35; }
.tl-org a { color: var(--tx) !important; transition: color 0.2s; }
.tl-org a:hover { color: var(--accent) !important; }
.tl-role { font-size: 0.78rem; color: var(--tx-2); line-height: 1.45; margin-top: 1px; }

/* Demo iframes */
.demo-wrap {
  position: relative; border-radius: 10px; overflow: hidden;
  border: 1px solid var(--border); background: var(--bg-surf);
  aspect-ratio: 16/9; margin-bottom: 0.5rem;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.demo-wrap:hover { border-color: var(--border-hi); box-shadow: var(--shadow-sm); }
.demo-overlay {
  position: absolute; inset: 0; z-index: 2;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.45); border-radius: 10px;
  pointer-events: none; transition: opacity 0.35s ease;
}
.demo-wrap:hover .demo-overlay,
.demo-wrap:focus-within .demo-overlay { opacity: 0; }
.demo-overlay span { color: #fff; font-size: 0.82rem; font-weight: 700; display: flex; align-items: center; gap: 0.4rem; }
.demo-iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.demo-caption { font-size: 0.77rem; color: var(--tx-muted); text-align: center; padding-bottom: 0.75rem; }
.demo-caption a { color: var(--green); font-weight: 600; }
.demos-label { font-size: 0.68rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--tx-muted); margin: 2rem 0 0.9rem; }

/* Footer */
.site-footer { border-top: 1px solid var(--border); padding: 2.5rem; text-align: center; color: var(--tx-muted); font-size: 0.8rem; }
.site-footer a { color: var(--green); }

/* Responsive */
@media (max-width: 768px) {
  .pub-card { flex-direction: column; }
  .pub-thumb { width: 100%; max-height: 190px; }
  .proj-grid { grid-template-columns: 1fr; }
  .nav-link:not(.always-show) { display: none; }
}
</style>

<body>

<nav class="site-nav">
  <a href="{{ site.url }}/" class="nav-brand">Justin Yu</a>
  <div class="nav-links">
    <a href="{{ site.url }}/about/"    class="nav-link always-show">About</a>
    <a href="{{ site.url }}/research/" class="nav-link">Research</a>
    <a href="{{ site.url }}/projects/" class="nav-link">Projects</a>
    <button class="theme-btn" id="theme-btn" title="Toggle light / dark mode">
      <i id="theme-icon" class="fas fa-sun"></i>
    </button>
  </div>
</nav>

<div class="page-content">
  {{ content }}
  {% include footer.html %}
</div>

<footer class="site-footer">
  &copy; {{ site.time | date: '%Y' }} {{ site.owner.name }}
</footer>

{% include js.html %}
<script src="{{ site.url }}/js/lightbox.js"></script>

<script>
const html2      = document.documentElement;
const themeBtn2  = document.getElementById('theme-btn');
const themeIcon2 = document.getElementById('theme-icon');

const savedTheme2 = localStorage.getItem('theme') || 'dark';
html2.setAttribute('data-theme', savedTheme2);
syncIcon2(savedTheme2);

themeBtn2.addEventListener('click', () => {
  const next = html2.dataset.theme === 'dark' ? 'light' : 'dark';
  html2.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  syncIcon2(next);
});

function syncIcon2(t) {
  themeIcon2.className = t === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
}
</script>

</body>
</html>
